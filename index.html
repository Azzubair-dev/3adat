<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3adat - Premium Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 500: '#10b981', 600: '#059669', 900: '#064e3b' }
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth custom scrollbar for calendar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen font-sans text-gray-800 pb-24">
    
    <!-- App Header -->
    <div class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-10">
        <div class="max-w-md mx-auto px-5 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">3adat <i class="fas fa-leaf text-brand-500 ml-1"></i></h1>
                <p class="text-xs text-gray-500 font-medium mt-0.5">Your Life Dashboard</p>
            </div>
            <div class="h-10 w-10 bg-brand-50 rounded-full flex items-center justify-center border border-brand-500/20">
                <i class="fas fa-calendar-check text-brand-600 text-lg"></i>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto pt-6 px-4">

        <!-- Monthly Calendar Widget -->
        <div class="bg-white p-5 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 mb-6">
            <div class="flex justify-between items-center mb-5">
                <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 transition-colors"><i class="fas fa-chevron-left"></i></button>
                <h2 id="currentMonthLabel" class="text-lg font-bold text-gray-800 tracking-wide">Month Year</h2>
                <button onclick="changeMonth(1)" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 transition-colors"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <div class="grid grid-cols-7 gap-2 text-center mb-2">
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Su</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Mo</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Tu</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">We</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Th</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Fr</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Sa</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1.5">
                <!-- Calendar Days render here -->
            </div>
            
            <!-- Visual Legend -->
            <div class="mt-5 pt-4 border-t border-gray-50 flex justify-center gap-4 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-sm"></div> Done</div>
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-amber-400 shadow-sm"></div> Partial</div>
                <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-rose-500 shadow-sm"></div> Missed</div>
            </div>
        </div>

        <!-- Selected Date Header -->
        <div class="mb-4 flex items-end justify-between px-1">
            <h2 id="selectedDateLabel" class="text-xl font-bold text-gray-900">Habits</h2>
        </div>

        <!-- Habits List -->
        <div id="habitsList" class="flex flex-col gap-3 mb-10">
            <!-- Cards render here -->
        </div>

        <!-- Add Habit Form -->
        <div class="bg-gray-900 p-6 rounded-2xl shadow-lg mt-8">
            <h3 class="font-bold text-white mb-4 text-lg">Add New Habit</h3>
            <form onsubmit="addHabit(event)" class="flex flex-col gap-4">
                <input type="text" id="habitInput" placeholder="e.g., Read 10 pages, Gym..." class="px-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-brand-500 bg-white/10 text-white placeholder-gray-400" required>
                
                <div class="relative">
                    <select id="isRepetitive" onchange="toggleRepetitiveInputs()" class="w-full px-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-brand-500 bg-white/10 text-white appearance-none cursor-pointer">
                        <option value="true" class="text-gray-900">🔄 Repetitive (Multiple days)</option>
                        <option value="false" class="text-gray-900">📅 Specific Date (One time)</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                </div>

                <!-- Conditional: Days of the Week (Now properly toggles) -->
                <div id="repetitiveWrapper" class="flex flex-wrap gap-2 mt-1">
                    <label class="flex-1 min-w-[30%] text-center cursor-pointer">
                        <input type="checkbox" value="0" class="day-checkbox peer sr-only">
                        <div class="bg-white/5 text-gray-300 py-2 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Sun</div>
                    </label>
                    <label class="flex-1 min-w-[30%] text-center cursor-pointer">
                        <input type="checkbox" value="1" class="day-checkbox peer sr-only">
                        <div class="bg-white/5 text-gray-300 py-2 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Mon</div>
                    </label>
                    <label class="flex-1 min-w-[30%] text-center cursor-pointer">
                        <input type="checkbox" value="2" class="day-checkbox peer sr-only">
                        <div class="bg-white/5 text-gray-300 py-2 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Tue</div>
                    </label>
                    <label class="flex-1 min-w-[30%] text-center cursor-pointer">
                        <input type="checkbox" value="3" class="day-checkbox peer sr-only">
                        <div class="bg-white/5 text-gray-300 py-2 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Wed</div>
                    </label>
                    <label class="flex-1 min-w-[30%] text-center cursor-pointer">
                        <input type="checkbox" value="4" class="day-checkbox peer sr-only">
                        <div class="bg-white/5 text-gray-300 py-2 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Thu</div>
                    </label>
                    <label class="flex-1 min-w-[30%] text-center cursor-pointer">
                        <input type="checkbox" value="5" class="day-checkbox peer sr-only">
                        <div class="bg-white/5 text-gray-300 py-2 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Fri</div>
                    </label>
                    <label class="flex-1 min-w-[30%] text-center cursor-pointer">
                        <input type="checkbox" value="6" class="day-checkbox peer sr-only">
                        <div class="bg-white/5 text-gray-300 py-2 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Sat</div>
                    </label>
                </div>

                <!-- Conditional: Specific Date -->
                <div id="specificDateWrapper" class="hidden mt-1">
                    <input type="date" id="specificDateInput" class="w-full px-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-brand-500 bg-white/10 text-white css-invert-calendar">
                </div>

                <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white w-full py-4 rounded-xl font-bold shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-colors mt-2 text-lg">
                    Save Habit
                </button>
            </form>
        </div>

    </div>

    <!-- Move Scripts to the Bottom to Ensure HTML Loads First -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG OBJECT HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // ----------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const habitsRef = collection(db, "habits");

        // --- App State ---
        let allHabits = [];
        const today = new Date();
        
        const toDateStr = (year, month, day) => {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        };

        window.currentMonth = today.getMonth();
        window.currentYear = today.getFullYear();
        window.selectedDate = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());

        // --- UI Logic for the Form Toggle ---
        window.toggleRepetitiveInputs = () => {
            const isRepetitive = document.getElementById("isRepetitive").value === "true";
            const repWrap = document.getElementById("repetitiveWrapper");
            const specWrap = document.getElementById("specificDateWrapper");
            
            if (isRepetitive) {
                // Show Repetitive, Hide Specific
                repWrap.classList.remove("hidden");
                repWrap.classList.add("flex");
                specWrap.classList.add("hidden");
                specWrap.classList.remove("block");
            } else {
                // Hide Repetitive, Show Specific
                repWrap.classList.add("hidden");
                repWrap.classList.remove("flex");
                specWrap.classList.remove("hidden");
                specWrap.classList.add("block");
            }
        };

        // --- Database Logic ---
        window.addHabit = async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById("habitInput");
            const isRepetitive = document.getElementById("isRepetitive").value === "true";
            const name = nameInput.value.trim();
            if (!name) return;

            let scheduleData = null;
            if (isRepetitive) {
                const checked = Array.from(document.querySelectorAll('.day-checkbox:checked')).map(cb => parseInt(cb.value));
                if (checked.length === 0) return alert("Please select at least one day.");
                scheduleData = checked; 
            } else {
                scheduleData = document.getElementById("specificDateInput").value;
                if (!scheduleData) return alert("Please specify a date.");
            }
            
            await addDoc(habitsRef, {
                name: name,
                repetitive: isRepetitive,
                scheduleData: scheduleData,
                history: [],
                createdAt: new Date().toISOString()
            });
            
            nameInput.value = "";
            document.querySelectorAll('.day-checkbox').forEach(cb => cb.checked = false);
            document.getElementById("specificDateInput").value = "";
        };

        window.toggleHabit = async (id, currentHistoryStr) => {
            const historyArray = currentHistoryStr ? currentHistoryStr.split(',') : [];
            const index = historyArray.indexOf(window.selectedDate);
            
            if (index > -1) {
                historyArray.splice(index, 1); 
            } else {
                historyArray.push(window.selectedDate); 
            }

            await updateDoc(doc(db, "habits", id), { history: historyArray.filter(Boolean) });
        };

        window.deleteHabit = async (id) => {
            if (confirm("Delete this habit entirely?")) await deleteDoc(doc(db, "habits", id));
        };

        // --- Calendar Logic ---
        window.changeMonth = (delta) => {
            window.currentMonth += delta;
            if (window.currentMonth > 11) {
                window.currentMonth = 0;
                window.currentYear++;
            } else if (window.currentMonth < 0) {
                window.currentMonth = 11;
                window.currentYear--;
            }
            renderApp();
        };

        window.selectDate = (dateStr) => {
            window.selectedDate = dateStr;
            renderApp();
        };

        const getHabitsForDate = (dateStr, dayOfWeekIndex) => {
            return allHabits.filter(h => {
                if (h.repetitive) {
                    return h.scheduleData.includes(dayOfWeekIndex);
                } else {
                    return h.scheduleData === dateStr;
                }
            });
        };

        const getTrafficLightColor = (dateStr, dayOfWeekIndex) => {
            const habitsDue = getHabitsForDate(dateStr, dayOfWeekIndex);
            
            // Neutral: No habits scheduled
            if (habitsDue.length === 0) return 'bg-gray-50 text-gray-400 border-gray-100 hover:bg-gray-100'; 
            
            const completedCount = habitsDue.filter(h => (h.history || []).includes(dateStr)).length;
            
            // Red: Nothing completed
            if (completedCount === 0) return 'bg-rose-500 text-white border-rose-600 shadow-sm font-semibold hover:bg-rose-600'; 
            // Green: All completed
            if (completedCount === habitsDue.length) return 'bg-emerald-500 text-white border-emerald-600 shadow-sm font-semibold hover:bg-emerald-600'; 
            // Yellow: Partially completed
            return 'bg-amber-400 text-white border-amber-500 shadow-sm font-semibold hover:bg-amber-500'; 
        };

        const renderApp = () => {
            // 1. Calendar Header
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById("currentMonthLabel").innerText = `${monthNames[window.currentMonth]} ${window.currentYear}`;

            // 2. Calendar Grid
            const firstDay = new Date(window.currentYear, window.currentMonth, 1).getDay();
            const daysInMonth = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
            
            let calHTML = "";
            
            // Empty slots
            for (let i = 0; i < firstDay; i++) {
                calHTML += `<div class="p-1"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = toDateStr(window.currentYear, window.currentMonth, day);
                const dayOfWeekIndex = new Date(window.currentYear, window.currentMonth, day).getDay();
                
                const colors = getTrafficLightColor(dateStr, dayOfWeekIndex);
                const isSelected = dateStr === window.selectedDate;
                const ringClass = isSelected ? 'ring-4 ring-gray-900 ring-offset-2 z-10 scale-105' : '';

                calHTML += `
                    <button onclick="selectDate('${dateStr}')" 
                        class="aspect-square flex items-center justify-center rounded-xl border text-sm transition-all duration-200 ease-out relative ${colors} ${ringClass}">
                        ${day}
                    </button>
                `;
            }
            document.getElementById("calendarGrid").innerHTML = calHTML;

            // 3. Render Habits List
            const list = document.getElementById("habitsList");
            const selectedDateObj = new Date(window.selectedDate);
            const displayDateObj = new Date(selectedDateObj.getTime() + Math.abs(selectedDateObj.getTimezoneOffset()*60000));
            
            // If today, say "Today, Date". Otherwise just "Date"
            const todayStr = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());
            const prefix = window.selectedDate === todayStr ? "Today, " : "";
            const formattedSelectedDate = displayDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            document.getElementById("selectedDateLabel").innerText = `${prefix}${formattedSelectedDate}`;
            
            const habitsDueToday = getHabitsForDate(window.selectedDate, selectedDateObj.getDay());
            list.innerHTML = "";

            if (habitsDueToday.length === 0) {
                list.innerHTML = `
                    <div class="bg-white rounded-2xl p-8 text-center border border-gray-100 border-dashed shadow-sm">
                        <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-mug-hot text-gray-300 text-xl"></i>
                        </div>
                        <p class="text-gray-400 font-medium text-sm">You have a clear day ahead.</p>
                    </div>`;
            } else {
                habitsDueToday.forEach((habit) => {
                    const history = habit.history || [];
                    const isCompleted = history.includes(window.selectedDate);
                    const historyString = history.join(',');

                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.05)] border border-gray-100 flex justify-between items-center gap-4 transition-all ${isCompleted ? 'opacity-70' : 'hover:-translate-y-0.5 hover:shadow-md'}">
                            <div class="flex items-center gap-4 flex-1">
                                <button onclick="toggleHabit('${habit.id}', '${historyString}')" 
                                    class="min-w-[32px] w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all duration-300 ${isCompleted ? 'bg-emerald-500 border-emerald-500 text-white scale-110 shadow-[0_0_10px_rgba(16,185,129,0.3)]' : 'border-gray-200 text-transparent hover:border-brand-400'}">
                                    <i class="fas fa-check text-sm ${isCompleted ? 'animate-[bounce_0.3s_ease-out]' : ''}"></i>
                                </button>
                                <span class="text-[17px] font-medium transition-all ${isCompleted ? 'line-through text-gray-400' : 'text-gray-800'}">${habit.name}</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="deleteHabit('${habit.id}')" class="text-gray-300 hover:text-rose-500 hover:bg-rose-50 w-8 h-8 rounded-full flex items-center justify-center transition-colors"><i class="fas fa-trash-alt text-[13px]"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
        };

        // Initialize App once DOM is fully ready
        document.addEventListener('DOMContentLoaded', () => {
            onSnapshot(habitsRef, (snapshot) => {
                allHabits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApp();
            });
        });
    </script>
</body>
</html>
