<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3adat - Smart Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 500: '#10b981', 600: '#059669', 900: '#064e3b' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen font-sans text-gray-800 pb-24">
    
    <!-- App Header -->
    <div class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-10">
        <div class="max-w-md mx-auto px-5 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">3adat <i class="fas fa-leaf text-brand-500 ml-1"></i></h1>
                <p class="text-xs text-gray-500 font-medium mt-0.5">Your Life Dashboard</p>
            </div>
            <div class="h-10 w-10 bg-brand-50 rounded-full flex items-center justify-center border border-brand-500/20">
                <i class="fas fa-calendar-check text-brand-600 text-lg"></i>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto pt-6 px-4">

        <!-- Monthly Calendar Widget -->
        <div class="bg-white p-5 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 mb-6">
            <div class="flex justify-between items-center mb-5">
                <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 transition-colors"><i class="fas fa-chevron-left"></i></button>
                <h2 id="currentMonthLabel" class="text-lg font-bold text-gray-800 tracking-wide">Month Year</h2>
                <button onclick="changeMonth(1)" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 transition-colors"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <div class="grid grid-cols-7 gap-2 text-center mb-2">
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Su</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Mo</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Tu</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">We</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Th</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Fr</div>
                <div class="text-[10px] font-bold uppercase text-gray-400 tracking-wider">Sa</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1.5">
                <!-- Calendar Days render here -->
            </div>
        </div>

        <!-- Selected Date Header -->
        <div class="mb-4 flex items-center justify-between px-1">
            <h2 id="selectedDateLabel" class="text-xl font-bold text-gray-900">Habits</h2>
            <button onclick="openModal()" class="text-brand-600 hover:bg-brand-100 bg-brand-50 border border-brand-200 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-1.5 transition-colors">
                <i class="fas fa-plus"></i> New
            </button>
        </div>

        <!-- Habits List -->
        <div id="habitsList" class="flex flex-col gap-3 mb-10">
            <!-- Cards render here -->
        </div>

    </div>

    <!-- Smart Modal -->
    <div id="habitModal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-end md:items-center justify-center overflow-y-auto">
        <div class="bg-gray-900 p-6 w-full max-w-md rounded-t-3xl md:rounded-3xl shadow-2xl relative my-auto animate-[slideUp_0.3s_ease-out]">
            <div class="flex justify-between items-center mb-5">
                <h3 id="modalTitle" class="font-bold text-white text-xl">Add New Habit</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center bg-white/10 rounded-full transition-colors"><i class="fas fa-times"></i></button>
            </div>
            
            <form onsubmit="saveHabit(event)" class="flex flex-col gap-4">
                
                <!-- Category Selector -->
                <div class="relative">
                    <select id="categorySelect" onchange="toggleNewCategory()" class="w-full px-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-brand-500 bg-white/10 text-white appearance-none cursor-pointer font-medium">
                        <!-- Populated by JS -->
                    </select>
                    <i class="fas fa-chevron-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                </div>

                <!-- Custom Category Inputs (Hidden by default) -->
                <div id="newCategoryWrapper" class="hidden bg-black/30 p-3 rounded-xl flex gap-2">
                    <input type="text" id="newCatName" placeholder="Name" class="flex-1 px-3 py-2 rounded-lg bg-white/10 text-white placeholder-gray-500 text-sm">
                    <input type="text" id="newCatEmoji" placeholder="Emoji 🎨" maxlength="2" class="w-20 px-3 py-2 rounded-lg bg-white/10 text-white placeholder-gray-500 text-center text-sm">
                    <select id="newCatColor" class="w-24 px-2 py-2 rounded-lg bg-white/10 text-white text-sm">
                        <option value="emerald">Green</option>
                        <option value="blue">Blue</option>
                        <option value="purple">Purple</option>
                        <option value="amber">Yellow</option>
                        <option value="rose">Red</option>
                        <option value="gray">Gray</option>
                    </select>
                </div>

                <input type="text" id="habitInput" placeholder="Habit name (e.g., Pray, Run...)" class="px-4 py-4 rounded-xl border-none focus:ring-2 focus:ring-brand-500 bg-white/10 text-white placeholder-gray-400 font-medium text-lg" required>
                
                <div class="relative">
                    <select id="isRepetitive" onchange="toggleRepetitiveInputs()" class="w-full px-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-brand-500 bg-white/10 text-white appearance-none cursor-pointer font-medium">
                        <option value="true" class="text-gray-900">Repetitive</option>
                        <option value="false" class="text-gray-900">One time</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                </div>

                <!-- Repetitive Wrapper -->
                <div id="repetitiveWrapper" class="flex flex-col gap-2 mt-1">
                    
                    <!-- Highly Visible Everyday Toggle -->
                    <button type="button" id="everydayBtn" onclick="toggleAllDays()" class="bg-gray-700 hover:bg-gray-600 text-white py-2.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2 shadow-sm w-full border border-gray-600 mb-1">
                        <i class="fas fa-check-double"></i> Select Everyday
                    </button>

                    <div class="flex flex-wrap gap-2">
                        <label class="flex-1 min-w-[22%] text-center cursor-pointer">
                            <input type="checkbox" value="0" class="day-checkbox peer sr-only" onchange="updateEverydayBtn()">
                            <div class="bg-white/5 text-gray-300 py-2.5 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Sun</div>
                        </label>
                        <label class="flex-1 min-w-[22%] text-center cursor-pointer">
                            <input type="checkbox" value="1" class="day-checkbox peer sr-only" onchange="updateEverydayBtn()">
                            <div class="bg-white/5 text-gray-300 py-2.5 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Mon</div>
                        </label>
                        <label class="flex-1 min-w-[22%] text-center cursor-pointer">
                            <input type="checkbox" value="2" class="day-checkbox peer sr-only" onchange="updateEverydayBtn()">
                            <div class="bg-white/5 text-gray-300 py-2.5 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Tue</div>
                        </label>
                        <label class="flex-1 min-w-[22%] text-center cursor-pointer">
                            <input type="checkbox" value="3" class="day-checkbox peer sr-only" onchange="updateEverydayBtn()">
                            <div class="bg-white/5 text-gray-300 py-2.5 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Wed</div>
                        </label>
                        <label class="flex-1 min-w-[22%] text-center cursor-pointer">
                            <input type="checkbox" value="4" class="day-checkbox peer sr-only" onchange="updateEverydayBtn()">
                            <div class="bg-white/5 text-gray-300 py-2.5 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Thu</div>
                        </label>
                        <label class="flex-1 min-w-[22%] text-center cursor-pointer">
                            <input type="checkbox" value="5" class="day-checkbox peer sr-only" onchange="updateEverydayBtn()">
                            <div class="bg-white/5 text-gray-300 py-2.5 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Fri</div>
                        </label>
                        <label class="flex-1 min-w-[22%] text-center cursor-pointer">
                            <input type="checkbox" value="6" class="day-checkbox peer sr-only" onchange="updateEverydayBtn()">
                            <div class="bg-white/5 text-gray-300 py-2.5 rounded-lg text-sm font-medium border border-white/10 peer-checked:bg-brand-500 peer-checked:text-white peer-checked:border-brand-500 transition-all">Sat</div>
                        </label>
                    </div>
                </div>

                <!-- Specific Date -->
                <div id="specificDateWrapper" class="hidden mt-1">
                    <input type="date" id="specificDateInput" class="w-full px-4 py-3.5 rounded-xl border-none focus:ring-2 focus:ring-brand-500 bg-white/10 text-white css-invert-calendar font-medium">
                </div>

                <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white w-full py-4 rounded-xl font-bold shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-colors mt-3 text-lg">
                    Save Habit
                </button>
            </form>
        </div>
    </div>
    
    <style>
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG OBJECT HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // ----------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const habitsRef = collection(db, "habits");

        // --- App State ---
        let allHabits = [];
        let editingHabitId = null; 
        const today = new Date();
        
        const toDateStr = (year, month, day) => {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        };

        const getTodayStr = () => toDateStr(today.getFullYear(), today.getMonth(), today.getDate());

        window.currentMonth = today.getMonth();
        window.currentYear = today.getFullYear();
        window.selectedDate = getTodayStr();

        // --- Category Definitions & Palettes ---
        const defaultCategories = {
            "Islamic": { name: "Islamic", emoji: "🕌", color: "emerald" },
            "Health": { name: "Health", emoji: "🏃‍♂️", color: "blue" },
            "Fun": { name: "Fun", emoji: "🎮", color: "purple" },
            "Mind": { name: "Mind", emoji: "🧠", color: "amber" },
            "Temporary": { name: "Temporary", emoji: "⏳", color: "gray" }
        };

        // Safe Tailwind rendering without relying on dynamic classes that might get purged
        const colorStyles = {
            "emerald": { bg: "bg-emerald-50", border: "border-emerald-200", text: "text-emerald-900", check: "bg-emerald-500 border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]" },
            "blue": { bg: "bg-blue-50", border: "border-blue-200", text: "text-blue-900", check: "bg-blue-500 border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.3)]" },
            "purple": { bg: "bg-purple-50", border: "border-purple-200", text: "text-purple-900", check: "bg-purple-500 border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.3)]" },
            "amber": { bg: "bg-amber-50", border: "border-amber-200", text: "text-amber-900", check: "bg-amber-500 border-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.3)]" },
            "rose": { bg: "bg-rose-50", border: "border-rose-200", text: "text-rose-900", check: "bg-rose-500 border-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.3)]" },
            "gray": { bg: "bg-gray-50", border: "border-gray-200", text: "text-gray-900", check: "bg-gray-500 border-gray-500 shadow-[0_0_10px_rgba(107,114,128,0.3)]" }
        };

        // Derive unique categories from user's current habits
        const getAvailableCategories = () => {
            const cats = { ...defaultCategories };
            allHabits.forEach(h => {
                if (h.category && h.category.name && !cats[h.category.name]) {
                    cats[h.category.name] = h.category;
                }
            });
            return cats;
        };

        const populateCategoryDropdown = (selectedName = "Islamic") => {
            const select = document.getElementById("categorySelect");
            const cats = getAvailableCategories();
            select.innerHTML = "";
            Object.values(cats).forEach(c => {
                select.innerHTML += `<option value="${c.name}" class="text-gray-900">${c.emoji} ${c.name}</option>`;
            });
            select.innerHTML += `<option value="_NEW_" class="text-gray-900 font-bold border-t border-gray-300">✨ Create New Category...</option>`;
            
            // Set value and trigger UI update
            select.value = cats[selectedName] ? selectedName : "Islamic";
            toggleNewCategory();
        };

        window.toggleNewCategory = () => {
            const val = document.getElementById("categorySelect").value;
            const wrap = document.getElementById("newCategoryWrapper");
            if (val === "_NEW_") {
                wrap.classList.remove("hidden");
                wrap.classList.add("flex");
            } else {
                wrap.classList.add("hidden");
                wrap.classList.remove("flex");
            }
        };

        // --- UI Modal Logic ---
        window.openModal = (habitId = null) => {
            const modal = document.getElementById("habitModal");
            const title = document.getElementById("modalTitle");
            editingHabitId = habitId;

            // Reset form
            document.getElementById("habitInput").value = "";
            document.getElementById("isRepetitive").value = "true";
            document.querySelectorAll('.day-checkbox').forEach(cb => cb.checked = false);
            document.getElementById("specificDateInput").value = getTodayStr();
            updateEverydayBtn();
            toggleRepetitiveInputs();

            if (habitId) {
                // Editing
                title.innerText = "Edit Habit";
                const habit = allHabits.find(h => h.id === habitId);
                
                populateCategoryDropdown(habit.category ? habit.category.name : "Islamic");
                
                document.getElementById("habitInput").value = habit.name;
                document.getElementById("isRepetitive").value = habit.repetitive.toString();
                toggleRepetitiveInputs();

                if (habit.repetitive) {
                    document.querySelectorAll('.day-checkbox').forEach(cb => {
                        if (habit.scheduleData.includes(parseInt(cb.value))) cb.checked = true;
                    });
                    updateEverydayBtn();
                } else {
                    document.getElementById("specificDateInput").value = habit.scheduleData;
                }
            } else {
                // New
                title.innerText = "Add New Habit";
                populateCategoryDropdown("Islamic");
            }

            modal.classList.remove("hidden");
        };

        window.closeModal = () => {
            document.getElementById("habitModal").classList.add("hidden");
            editingHabitId = null;
        };

        window.toggleAllDays = () => {
            const checkboxes = document.querySelectorAll('.day-checkbox');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            
            // If all are checked, uncheck all. Otherwise, check all.
            checkboxes.forEach(cb => cb.checked = !allChecked);
            updateEverydayBtn();
        };

        window.updateEverydayBtn = () => {
            const checkboxes = document.querySelectorAll('.day-checkbox');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            const btn = document.getElementById("everydayBtn");
            
            if (allChecked) {
                btn.innerHTML = '<i class="fas fa-times"></i> Clear Days';
                btn.classList.remove('bg-gray-700', 'hover:bg-gray-600', 'border-gray-600');
                btn.classList.add('bg-brand-600', 'hover:bg-brand-500', 'border-brand-500');
            } else {
                btn.innerHTML = '<i class="fas fa-check-double"></i> Select Everyday';
                btn.classList.add('bg-gray-700', 'hover:bg-gray-600', 'border-gray-600');
                btn.classList.remove('bg-brand-600', 'hover:bg-brand-500', 'border-brand-500');
            }
        };

        window.toggleRepetitiveInputs = () => {
            const isRepetitive = document.getElementById("isRepetitive").value === "true";
            const repWrap = document.getElementById("repetitiveWrapper");
            const specWrap = document.getElementById("specificDateWrapper");
            
            if (isRepetitive) {
                repWrap.classList.remove("hidden");
                repWrap.classList.add("flex");
                specWrap.classList.add("hidden");
                specWrap.classList.remove("block");
            } else {
                repWrap.classList.add("hidden");
                repWrap.classList.remove("flex");
                specWrap.classList.remove("hidden");
                specWrap.classList.add("block");
            }
        };

        // --- Database Logic ---
        window.saveHabit = async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById("habitInput");
            const isRepetitive = document.getElementById("isRepetitive").value === "true";
            const name = nameInput.value.trim();
            if (!name) return;

            // Build Schedule Data
            let scheduleData = null;
            if (isRepetitive) {
                const checked = Array.from(document.querySelectorAll('.day-checkbox:checked')).map(cb => parseInt(cb.value));
                if (checked.length === 0) return alert("Please select at least one day.");
                scheduleData = checked; 
            } else {
                scheduleData = document.getElementById("specificDateInput").value;
                if (!scheduleData) return alert("Please specify a date.");
            }

            // Build Category Data
            const catSelectValue = document.getElementById("categorySelect").value;
            let categoryObj;
            if (catSelectValue === "_NEW_") {
                categoryObj = {
                    name: document.getElementById("newCatName").value.trim() || "Custom",
                    emoji: document.getElementById("newCatEmoji").value.trim() || "📌",
                    color: document.getElementById("newCatColor").value
                };
            } else {
                categoryObj = getAvailableCategories()[catSelectValue];
            }
            
            if (editingHabitId) {
                await updateDoc(doc(db, "habits", editingHabitId), {
                    name: name,
                    repetitive: isRepetitive,
                    scheduleData: scheduleData,
                    category: categoryObj
                });
            } else {
                await addDoc(habitsRef, {
                    name: name,
                    repetitive: isRepetitive,
                    scheduleData: scheduleData,
                    category: categoryObj,
                    history: [],
                    order: Date.now(),
                    createdAt: new Date().toISOString()
                });
            }
            
            closeModal();
        };

        window.toggleHabit = async (id, currentHistoryStr) => {
            const historyArray = currentHistoryStr ? currentHistoryStr.split(',') : [];
            const index = historyArray.indexOf(window.selectedDate);
            
            if (index > -1) { historyArray.splice(index, 1); } 
            else { historyArray.push(window.selectedDate); }

            await updateDoc(doc(db, "habits", id), { history: historyArray.filter(Boolean) });
        };

        window.deleteHabit = async (id) => {
            if (confirm("Delete this habit entirely?")) await deleteDoc(doc(db, "habits", id));
        };

        window.moveHabit = async (habitId, direction) => {
            const dayOfWeekIndex = new Date(window.selectedDate).getDay();
            let dueHabits = getHabitsForDate(window.selectedDate, dayOfWeekIndex);
            dueHabits.sort((a, b) => a.order - b.order);
            
            const index = dueHabits.findIndex(h => h.id === habitId);
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= dueHabits.length) return;
            
            const currentHabit = dueHabits[index];
            const targetHabit = dueHabits[targetIndex];
            
            let newCurrentOrder = targetHabit.order;
            let newTargetOrder = currentHabit.order;
            
            if (newCurrentOrder === newTargetOrder) newCurrentOrder += (direction * 10);

            await updateDoc(doc(db, "habits", currentHabit.id), { order: newCurrentOrder });
            await updateDoc(doc(db, "habits", targetHabit.id), { order: newTargetOrder });
        };

        // --- Calendar Logic ---
        window.changeMonth = (delta) => {
            window.currentMonth += delta;
            if (window.currentMonth > 11) {
                window.currentMonth = 0;
                window.currentYear++;
            } else if (window.currentMonth < 0) {
                window.currentMonth = 11;
                window.currentYear--;
            }
            renderApp();
        };

        window.selectDate = (dateStr) => {
            window.selectedDate = dateStr;
            renderApp();
        };

        const getHabitsForDate = (dateStr, dayOfWeekIndex) => {
            return allHabits.filter(h => {
                if (h.repetitive) {
                    return h.scheduleData.includes(dayOfWeekIndex);
                } else {
                    return h.scheduleData === dateStr;
                }
            });
        };

        const getTrafficLightColor = (dateStr, dayOfWeekIndex) => {
            const habitsDue = getHabitsForDate(dateStr, dayOfWeekIndex);
            const isFuture = dateStr > getTodayStr();
            
            if (habitsDue.length === 0) return 'bg-gray-50 text-gray-400 border-gray-100 hover:bg-gray-100'; 
            
            const completedCount = habitsDue.filter(h => (h.history || []).includes(dateStr)).length;
            
            if (completedCount === habitsDue.length) return 'bg-emerald-500 text-white border-emerald-600 shadow-sm font-semibold hover:bg-emerald-600'; 
            if (isFuture) return 'bg-gray-50 text-gray-400 border-gray-100 hover:bg-gray-100'; 
            if (completedCount === 0) return 'bg-rose-500 text-white border-rose-600 shadow-sm font-semibold hover:bg-rose-600'; 
            
            return 'bg-amber-400 text-white border-amber-500 shadow-sm font-semibold hover:bg-amber-500'; 
        };

        const renderApp = () => {
            // 1. Calendar Header
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById("currentMonthLabel").innerText = `${monthNames[window.currentMonth]} ${window.currentYear}`;

            // 2. Calendar Grid
            const firstDay = new Date(window.currentYear, window.currentMonth, 1).getDay();
            const daysInMonth = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
            
            let calHTML = "";
            for (let i = 0; i < firstDay; i++) { calHTML += `<div class="p-1"></div>`; }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = toDateStr(window.currentYear, window.currentMonth, day);
                const dayOfWeekIndex = new Date(window.currentYear, window.currentMonth, day).getDay();
                
                const colors = getTrafficLightColor(dateStr, dayOfWeekIndex);
                const isSelected = dateStr === window.selectedDate;
                const ringClass = isSelected ? 'ring-4 ring-gray-900 ring-offset-2 z-10 scale-105' : '';

                calHTML += `
                    <button onclick="selectDate('${dateStr}')" 
                        class="aspect-square flex items-center justify-center rounded-xl border text-sm transition-all duration-200 ease-out relative ${colors} ${ringClass}">
                        ${day}
                    </button>
                `;
            }
            document.getElementById("calendarGrid").innerHTML = calHTML;

            // 3. Render Habits List
            const list = document.getElementById("habitsList");
            const selectedDateObj = new Date(window.selectedDate);
            const displayDateObj = new Date(selectedDateObj.getTime() + Math.abs(selectedDateObj.getTimezoneOffset()*60000));
            
            const todayStr = getTodayStr();
            const prefix = window.selectedDate === todayStr ? "Today, " : "";
            const formattedSelectedDate = displayDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            document.getElementById("selectedDateLabel").innerText = `${prefix}${formattedSelectedDate}`;
            
            const habitsDueToday = getHabitsForDate(window.selectedDate, selectedDateObj.getDay());
            habitsDueToday.sort((a, b) => (a.order || 0) - (b.order || 0));

            list.innerHTML = "";

            if (habitsDueToday.length === 0) {
                list.innerHTML = `
                    <div class="bg-white rounded-2xl p-8 text-center border border-gray-100 border-dashed shadow-sm mt-4">
                        <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-mug-hot text-gray-300 text-xl"></i>
                        </div>
                        <p class="text-gray-400 font-medium text-sm">You have a clear day ahead.</p>
                    </div>`;
            } else {
                habitsDueToday.forEach((habit, index) => {
                    const history = habit.history || [];
                    const isCompleted = history.includes(window.selectedDate);
                    const historyString = history.join(',');
                    
                    // Determine Style based on Category
                    const catObj = habit.category || defaultCategories["Temporary"];
                    const style = colorStyles[catObj.color] || colorStyles["gray"];
                    
                    const upBtn = index > 0 ? `<button onclick="moveHabit('${habit.id}', -1)" class="text-gray-400 hover:text-gray-700 p-1 transition-colors"><i class="fas fa-chevron-up text-[11px]"></i></button>` : `<div class="w-5 h-5"></div>`;
                    const downBtn = index < habitsDueToday.length - 1 ? `<button onclick="moveHabit('${habit.id}', 1)" class="text-gray-400 hover:text-gray-700 p-1 transition-colors"><i class="fas fa-chevron-down text-[11px]"></i></button>` : `<div class="w-5 h-5"></div>`;

                    list.innerHTML += `
                        <div class="${style.bg} p-4 rounded-2xl border ${style.border} flex justify-between items-center gap-4 transition-all ${isCompleted ? 'opacity-70' : 'hover:-translate-y-0.5 hover:shadow-sm'}">
                            <div class="flex items-center gap-4 flex-1">
                                <button onclick="toggleHabit('${habit.id}', '${historyString}')" 
                                    class="min-w-[32px] w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all duration-300 ${isCompleted ? style.check + ' text-white scale-110' : 'border-gray-300 bg-white text-transparent hover:border-gray-400'}">
                                    <i class="fas fa-check text-sm ${isCompleted ? 'animate-[bounce_0.3s_ease-out]' : ''}"></i>
                                </button>
                                <span class="text-[17px] font-medium transition-all flex items-center gap-2 ${isCompleted ? 'line-through text-gray-500' : style.text}">
                                    <span class="text-xl bg-white/50 w-8 h-8 flex items-center justify-center rounded-lg shadow-sm border border-white/40">${catObj.emoji}</span> 
                                    ${habit.name}
                                </span>
                            </div>
                            
                            <div class="flex items-center border-l border-white/50 pl-3">
                                <div class="flex flex-col -space-y-1 mr-2">
                                    ${upBtn}
                                    ${downBtn}
                                </div>
                                <button onclick="openModal('${habit.id}')" class="text-gray-400 hover:text-gray-800 w-8 h-8 rounded-full flex items-center justify-center transition-colors"><i class="fas fa-pen text-[13px]"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            onSnapshot(habitsRef, (snapshot) => {
                allHabits = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        id: doc.id,
                        ...data,
                        order: data.order !== undefined ? data.order : new Date(data.createdAt).getTime()
                    };
                });
                renderApp();
            });
        });
    </script>
</body>
</html>
