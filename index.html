<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3adat - Smart Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG OBJECT HERE ---
        const firebaseConfig = {
            // apiKey: "YOUR_API_KEY",
            // authDomain: "YOUR_AUTH_DOMAIN",
            // etc...
        };
        // ----------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const habitsRef = collection(db, "habits");

        // --- App State ---
        let allHabits = [];
        const today = new Date();
        
        // Format date to YYYY-MM-DD carefully avoiding timezone shifts
        const toDateStr = (year, month, day) => {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        };

        window.currentMonth = today.getMonth();
        window.currentYear = today.getFullYear();
        window.selectedDate = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());

        // --- UI Logic ---
        window.toggleRepetitiveInputs = () => {
            const isRepetitive = document.getElementById("isRepetitive").value === "true";
            document.getElementById("repetitiveWrapper").classList.toggle("hidden", !isRepetitive);
            document.getElementById("specificDateWrapper").classList.toggle("hidden", isRepetitive);
        };

        // --- Database Logic ---
        window.addHabit = async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById("habitInput");
            const isRepetitive = document.getElementById("isRepetitive").value === "true";
            const name = nameInput.value.trim();
            if (!name) return;

            let scheduleData = null;
            if (isRepetitive) {
                const checked = Array.from(document.querySelectorAll('.day-checkbox:checked')).map(cb => parseInt(cb.value));
                if (checked.length === 0) return alert("Please select at least one day.");
                scheduleData = checked; // Array of integers [0, 1, 2...]
            } else {
                scheduleData = document.getElementById("specificDateInput").value;
                if (!scheduleData) return alert("Please specify a date.");
            }
            
            await addDoc(habitsRef, {
                name: name,
                repetitive: isRepetitive,
                scheduleData: scheduleData,
                history: [],
                createdAt: new Date().toISOString()
            });
            
            nameInput.value = "";
            document.querySelectorAll('.day-checkbox').forEach(cb => cb.checked = false);
            document.getElementById("specificDateInput").value = "";
        };

        window.toggleHabit = async (id, currentHistoryStr) => {
            const historyArray = currentHistoryStr ? currentHistoryStr.split(',') : [];
            const index = historyArray.indexOf(window.selectedDate);
            
            if (index > -1) {
                historyArray.splice(index, 1); // Uncheck
            } else {
                historyArray.push(window.selectedDate); // Check
            }

            await updateDoc(doc(db, "habits", id), { history: historyArray.filter(Boolean) });
        };

        window.deleteHabit = async (id) => {
            if (confirm("Delete this habit entirely?")) await deleteDoc(doc(db, "habits", id));
        };

        // --- Calendar Logic ---
        window.changeMonth = (delta) => {
            window.currentMonth += delta;
            if (window.currentMonth > 11) {
                window.currentMonth = 0;
                window.currentYear++;
            } else if (window.currentMonth < 0) {
                window.currentMonth = 11;
                window.currentYear--;
            }
            renderApp();
        };

        window.selectDate = (dateStr) => {
            window.selectedDate = dateStr;
            renderApp();
        };

        const getHabitsForDate = (dateStr, dayOfWeekIndex) => {
            return allHabits.filter(h => {
                if (h.repetitive) {
                    return h.scheduleData.includes(dayOfWeekIndex);
                } else {
                    return h.scheduleData === dateStr;
                }
            });
        };

        const getTrafficLightColor = (dateStr, dayOfWeekIndex) => {
            const habitsDue = getHabitsForDate(dateStr, dayOfWeekIndex);
            if (habitsDue.length === 0) return 'bg-white hover:bg-gray-50 border-gray-100 text-gray-700'; // Neutral
            
            const completedCount = habitsDue.filter(h => (h.history || []).includes(dateStr)).length;
            
            if (completedCount === 0) return 'bg-red-100 border-red-200 text-red-800'; // Red
            if (completedCount === habitsDue.length) return 'bg-green-100 border-green-200 text-green-800'; // Green
            return 'bg-yellow-100 border-yellow-200 text-yellow-800'; // Yellow
        };

        const renderApp = () => {
            // 1. Render Calendar Header
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById("currentMonthLabel").innerText = `${monthNames[window.currentMonth]} ${window.currentYear}`;

            // 2. Render Calendar Grid
            const firstDay = new Date(window.currentYear, window.currentMonth, 1).getDay();
            const daysInMonth = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
            
            let calHTML = "";
            
            // Empty slots before the 1st of the month
            for (let i = 0; i < firstDay; i++) {
                calHTML += `<div class="p-2"></div>`;
            }

            // Days of the month
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = toDateStr(window.currentYear, window.currentMonth, day);
                const dayOfWeekIndex = new Date(window.currentYear, window.currentMonth, day).getDay();
                
                const colors = getTrafficLightColor(dateStr, dayOfWeekIndex);
                const isSelected = dateStr === window.selectedDate;
                const ringClass = isSelected ? 'ring-2 ring-blue-500 ring-offset-1 border-blue-500 font-bold' : '';

                calHTML += `
                    <button onclick="selectDate('${dateStr}')" 
                        class="aspect-square flex items-center justify-center rounded-lg border transition-all ${colors} ${ringClass}">
                        ${day}
                    </button>
                `;
            }
            document.getElementById("calendarGrid").innerHTML = calHTML;

            // 3. Render Habits for Selected Date
            const list = document.getElementById("habitsList");
            const selectedDateObj = new Date(window.selectedDate);
            // Fix timezone display issue for header
            const displayDateObj = new Date(selectedDateObj.getTime() + Math.abs(selectedDateObj.getTimezoneOffset()*60000));
            const formattedSelectedDate = displayDateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            document.getElementById("selectedDateLabel").innerText = `Habits for ${formattedSelectedDate}`;
            
            const habitsDueToday = getHabitsForDate(window.selectedDate, selectedDateObj.getDay());
            list.innerHTML = "";

            if (habitsDueToday.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 py-6">No habits scheduled for this day.</div>`;
            } else {
                habitsDueToday.forEach((habit) => {
                    const history = habit.history || [];
                    const isCompleted = history.includes(window.selectedDate);
                    const historyString = history.join(',');

                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center gap-4 hover:shadow-md transition-shadow">
                            <div class="flex items-center gap-4 flex-1">
                                <button onclick="toggleHabit('${habit.id}', '${historyString}')" 
                                    class="min-w-[32px] w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 text-transparent hover:border-green-400'}">
                                    <i class="fas fa-check text-sm"></i>
                                </button>
                                <span class="text-lg font-medium ${isCompleted ? 'line-through text-gray-400' : 'text-gray-800'}">${habit.name}</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="deleteHabit('${habit.id}')" class="text-gray-300 hover:text-red-500 transition-colors p-2"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
        };

        // Listen to Firebase and update local state
        onSnapshot(habitsRef, (snapshot) => {
            allHabits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderApp();
        });
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans selection:bg-blue-100 pb-24">
    <div class="max-w-md mx-auto pt-6 px-4">
        
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">3adat</h1>
                <p class="text-sm text-gray-500 mt-1">Calendar & Tracker</p>
            </div>
        </header>

        <!-- Full Month Calendar -->
        <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm mb-6">
            <div class="flex justify-between items-center mb-4 px-2">
                <button onclick="changeMonth(-1)" class="text-gray-400 hover:text-gray-800 p-2"><i class="fas fa-chevron-left"></i></button>
                <h2 id="currentMonthLabel" class="text-lg font-bold text-gray-800">Month Year</h2>
                <button onclick="changeMonth(1)" class="text-gray-400 hover:text-gray-800 p-2"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <div class="grid grid-cols-7 gap-1 text-center mb-2">
                <div class="text-xs font-semibold text-gray-400">Su</div>
                <div class="text-xs font-semibold text-gray-400">Mo</div>
                <div class="text-xs font-semibold text-gray-400">Tu</div>
                <div class="text-xs font-semibold text-gray-400">We</div>
                <div class="text-xs font-semibold text-gray-400">Th</div>
                <div class="text-xs font-semibold text-gray-400">Fr</div>
                <div class="text-xs font-semibold text-gray-400">Sa</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1">
                <!-- Calendar Days render here -->
            </div>
        </div>

        <!-- Habits List for Selected Date -->
        <div class="mb-8">
            <h2 id="selectedDateLabel" class="text-xl font-bold text-gray-800 mb-3 ml-1">Habits</h2>
            <div id="habitsList" class="flex flex-col gap-3">
                <!-- Cards render here -->
            </div>
        </div>

        <!-- Add Habit Form -->
        <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm mt-8 border-t-4 border-t-blue-500">
            <h3 class="font-bold text-gray-800 mb-4 tracking-wide">Create New Habit</h3>
            <form onsubmit="addHabit(event)" class="flex flex-col gap-4">
                <input type="text" id="habitInput" placeholder="Habit name (e.g., Read 10 pages)" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" required>
                
                <select id="isRepetitive" onchange="toggleRepetitiveInputs()" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <option value="true">Repetitive (Multiple days)</option>
                    <option value="false">Specific Date (One time)</option>
                </select>

                <!-- Conditional Input: Days of the Week -->
                <div id="repetitiveWrapper" class="flex flex-wrap gap-2">
                    <label class="flex items-center gap-1 bg-blue-50 px-3 py-2 rounded-lg text-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><input type="checkbox" value="0" class="day-checkbox"> Sun</label>
                    <label class="flex items-center gap-1 bg-blue-50 px-3 py-2 rounded-lg text-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><input type="checkbox" value="1" class="day-checkbox"> Mon</label>
                    <label class="flex items-center gap-1 bg-blue-50 px-3 py-2 rounded-lg text-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><input type="checkbox" value="2" class="day-checkbox"> Tue</label>
                    <label class="flex items-center gap-1 bg-blue-50 px-3 py-2 rounded-lg text-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><input type="checkbox" value="3" class="day-checkbox"> Wed</label>
                    <label class="flex items-center gap-1 bg-blue-50 px-3 py-2 rounded-lg text-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><input type="checkbox" value="4" class="day-checkbox"> Thu</label>
                    <label class="flex items-center gap-1 bg-blue-50 px-3 py-2 rounded-lg text-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><input type="checkbox" value="5" class="day-checkbox"> Fri</label>
                    <label class="flex items-center gap-1 bg-blue-50 px-3 py-2 rounded-lg text-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><input type="checkbox" value="6" class="day-checkbox"> Sat</label>
                </div>

                <!-- Conditional Input: Specific Date -->
                <div id="specificDateWrapper" class="hidden">
                    <input type="date" id="specificDateInput" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 text-gray-700">
                </div>

                <button type="submit" class="bg-gray-900 hover:bg-gray-800 text-white w-full py-3 rounded-lg font-bold shadow-sm transition-colors mt-2">
                    Save Habit
                </button>
            </form>
        </div>

    </div>
</body>
</html>
