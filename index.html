<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3adat - Daily Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
    <div id="app" class="min-h-screen">
        <!-- Loading State -->
        <div id="loading" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
            <div class="text-center">
                <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-200 border-t-blue-600 mx-auto mb-4"></div>
                <p class="text-gray-600 text-lg">Initializing Habit Tracker...</p>
            </div>
        </div>

        <!-- Main App -->
        <div id="appScreen" class="hidden">
            <!-- Header -->
            <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200">
                <div class="max-w-5xl mx-auto px-6 py-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">3adat</h1>
                            <p class="text-sm text-gray-500 mt-1">Build Better Habits, One Day at a Time</p>
                        </div>
                        <div class="text-right">
                            <p id="todayDate" class="text-lg font-semibold text-gray-800"></p>
                            <p id="dayOfWeek" class="text-sm text-gray-500"></p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="max-w-5xl mx-auto px-6 py-8">
                <!-- Add New Habit Card -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8 hover:shadow-md transition-shadow">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <span class="text-2xl">➕</span>
                        Add New Habit
                    </h2>
                    <form id="addHabitForm" class="flex gap-3">
                        <input 
                            type="text" 
                            id="habitInput" 
                            placeholder="e.g., Morning Exercise, Read, Meditate, Drink Water..." 
                            class="flex-1 px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-800"
                            required
                        >
                        <button 
                            type="submit" 
                            class="px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-lg hover:from-blue-700 hover:to-blue-800 transition font-semibold shadow-sm"
                        >
                            Add
                        </button>
                    </form>
                </div>

                <!-- Stats Row -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <p class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Today's Progress</p>
                        <p class="text-4xl font-bold text-blue-600 mt-2"><span id="todayProgress">0</span>%</p>
                        <div class="h-2 bg-slate-200 rounded-full mt-3 overflow-hidden">
                            <div id="progressBar" class="h-full bg-gradient-to-r from-blue-500 to-blue-600 transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <p class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Total Habits</p>
                        <p class="text-4xl font-bold text-purple-600 mt-2"><span id="totalHabits">0</span></p>
                        <p class="text-sm text-gray-500 mt-3">Active habits</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <p class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Today's Wins</p>
                        <p class="text-4xl font-bold text-green-600 mt-2"><span id="todayWins">0</span></p>
                        <p class="text-sm text-gray-500 mt-3">Completed today</p>
                    </div>
                </div>

                <!-- Habits List -->
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Today's Habits</h2>
                    <div id="habitsList" class="space-y-4">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center">
                            <p class="text-gray-400 text-lg">✨ No habits yet. Create one to get started!</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAhr-cdCfz0RkclFiz-_BxJkDctbP7PJSA",
            authDomain: "adat-a41ad.firebaseapp.com",
            projectId: "adat-a41ad",
            storageBucket: "adat-a41ad.firebasestorage.app",
            messagingSenderId: "749510315419",
            appId: "1:749510315419:web:c5ec6ee05e2b39b676253e",
            measurementId: "G-99WXYDNVVE"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let habits = [];
        let isInitialized = false;

        // UI Elements
        const loadingScreen = document.getElementById("loading");
        const appScreen = document.getElementById("appScreen");
        const habitsList = document.getElementById("habitsList");
        const addHabitForm = document.getElementById("addHabitForm");
        const habitInput = document.getElementById("habitInput");
        const todayDate = document.getElementById("todayDate");
        const dayOfWeek = document.getElementById("dayOfWeek");
        const todayProgress = document.getElementById("todayProgress");
        const progressBar = document.getElementById("progressBar");
        const totalHabits = document.getElementById("totalHabits");
        const todayWins = document.getElementById("todayWins");

        // Utility Functions
        function getTodayDateKey() {
            const now = new Date();
            return now.toISOString().split('T')[0]; // YYYY-MM-DD
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        function updateDateDisplay() {
            const now = new Date();
            todayDate.textContent = now.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric' 
            });
            dayOfWeek.textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
        }

        // Get last 5 days for streak calculation
        function getLastFiveDays() {
            const days = [];
            for (let i = 4; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                days.push(date.toISOString().split('T')[0]);
            }
            return days;
        }

        // Check if date is in history
        function isDateInHistory(history, dateKey) {
            return history && history.includes(dateKey);
        }

        // Load habits from Firestore
        async function loadHabits() {
            try {
                const q = query(collection(db, "habits"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                habits = [];
                querySnapshot.forEach(doc => {
                    habits.push({ 
                        id: doc.id, 
                        ...doc.data(),
                        history: doc.data().history || []
                    });
                });

                renderHabits();
                updateStats();
                
                if (!isInitialized) {
                    isInitialized = true;
                    loadingScreen.classList.add("hidden");
                    appScreen.classList.remove("hidden");
                    updateDateDisplay();
                }
            } catch (error) {
                console.error("Error loading habits:", error);
            }
        }

        // Render habits
        function renderHabits() {
            if (habits.length === 0) {
                habitsList.innerHTML = '<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center"><p class="text-gray-400 text-lg">✨ No habits yet. Create one to get started!</p></div>';
                return;
            }

            const todayKey = getTodayDateKey();
            const lastFiveDays = getLastFiveDays();

            habitsList.innerHTML = habits.map((habit, index) => {
                const isCompletedToday = isDateInHistory(habit.history, todayKey);
                const streakDays = lastFiveDays.map(date => ({
                    date,
                    completed: isDateInHistory(habit.history, date)
                }));

                return `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 hover:shadow-md transition-shadow">
                        <div class="flex items-start justify-between gap-4">
                            <!-- Checkbox and Title -->
                            <div class="flex items-start gap-4 flex-1 min-w-0">
                                <input 
                                    type="checkbox" 
                                    ${isCompletedToday ? 'checked' : ''} 
                                    class="w-6 h-6 cursor-pointer mt-1 flex-shrink-0 rounded border-slate-300 text-blue-600 focus:ring-2 focus:ring-blue-500 transition" 
                                    data-id="${habit.id}" 
                                    onchange="window.toggleHabit('${habit.id}', this.checked)"
                                >
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-lg text-gray-800 break-words ${isCompletedToday ? 'line-through text-gray-400' : ''}">
                                        ${habit.name}
                                    </p>
                                    <p class="text-sm text-gray-500 mt-1">
                                        Created ${formatDate(habit.createdAt?.toDate ? habit.createdAt.toDate() : habit.createdAt)}
                                    </p>
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="flex gap-2 flex-shrink-0">
                                <button 
                                    onclick="window.editHabit('${habit.id}')" 
                                    class="px-3 py-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition text-sm font-medium"
                                    title="Edit"
                                >
                                    ✏️
                                </button>
                                <button 
                                    onclick="window.deleteHabit('${habit.id}')" 
                                    class="px-3 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition text-sm font-medium"
                                    title="Delete"
                                >
                                    🗑️
                                </button>
                            </div>
                        </div>

                        <!-- Streak Indicator -->
                        <div class="mt-4 pt-4 border-t border-slate-100">
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">5-Day Streak</p>
                            <div class="flex gap-2 items-center">
                                ${streakDays.map(day => `
                                    <div 
                                        class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-transform hover:scale-110 cursor-help"
                                        title="${day.date}"
                                        style="background-color: ${day.completed ? '#10b981' : '#e2e8f0'}; color: ${day.completed ? 'white' : '#9ca3af'};"
                                    >
                                        ${day.completed ? '✓' : '○'}
                                    </div>
                                `).join('')}
                                <span class="text-xs text-gray-500 ml-2">
                                    ${habit.history ? habit.history.length : 0} total days
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update statistics
        function updateStats() {
            const todayKey = getTodayDateKey();
            const completedToday = habits.filter(h => isDateInHistory(h.history, todayKey)).length;
            const totalCount = habits.length;
            const progress = totalCount > 0 ? Math.round((completedToday / totalCount) * 100) : 0;

            todayProgress.textContent = progress;
            progressBar.style.width = progress + '%';
            totalHabits.textContent = totalCount;
            todayWins.textContent = completedToday;
        }

        // Add habit
        async function addHabit() {
            if (!habitInput.value.trim()) return;

            try {
                await addDoc(collection(db, "habits"), {
                    name: habitInput.value.trim(),
                    history: [],
                    createdAt: serverTimestamp()
                });
                habitInput.value = "";
                await loadHabits();
            } catch (error) {
                console.error("Error adding habit:", error);
                alert("Failed to add habit. Please try again.");
            }
        }

        // Toggle habit completion
        window.toggleHabit = async function(habitId, completed) {
            const todayKey = getTodayDateKey();
            const habit = habits.find(h => h.id === habitId);
            
            if (!habit) return;

            try {
                let updatedHistory = habit.history || [];
                
                if (completed) {
                    // Add today's date if not already present
                    if (!updatedHistory.includes(todayKey)) {
                        updatedHistory.push(todayKey);
                    }
                } else {
                    // Remove today's date
                    updatedHistory = updatedHistory.filter(date => date !== todayKey);
                }

                await updateDoc(doc(db, "habits", habitId), {
                    history: updatedHistory
                });
                
                await loadHabits();
            } catch (error) {
                console.error("Error toggling habit:", error);
                alert("Failed to update habit. Please try again.");
            }
        };

        // Edit habit (rename)
        window.editHabit = async function(habitId) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            const newName = prompt("Edit habit name:", habit.name);
            if (newName === null || !newName.trim()) return;

            try {
                await updateDoc(doc(db, "habits", habitId), {
                    name: newName.trim()
                });
                await loadHabits();
            } catch (error) {
                console.error("Error updating habit:", error);
                alert("Failed to update habit. Please try again.");
            }
        };

        // Delete habit
        window.deleteHabit = async function(habitId) {
            if (!confirm("Are you sure you want to delete this habit? This action cannot be undone.")) return;
            
            try {
                await deleteDoc(doc(db, "habits", habitId));
                await loadHabits();
            } catch (error) {
                console.error("Error deleting habit:", error);
                alert("Failed to delete habit. Please try again.");
            }
        };

        // Event listeners
        addHabitForm.addEventListener("submit", (e) => {
            e.preventDefault();
            addHabit();
        });

        // Initial load
        await loadHabits();
    </script>
</body>
</html>
