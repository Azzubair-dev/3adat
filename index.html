<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3adat - Smart Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG OBJECT HERE ---
        const firebaseConfig = {
            // apiKey: "YOUR_API_KEY",
            // authDomain: "YOUR_AUTH_DOMAIN",
            // etc...
        };
        // ----------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const habitsRef = collection(db, "habits");

        // App State
        let allHabits = [];
        const todayStr = new Date().toLocaleDateString('en-CA');
        window.selectedDate = todayStr; // Defaults to today

        // Generate the 10-day window (Today + next 9 days)
        const get10Days = () => {
            const dates = [];
            for (let i = 0; i < 10; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                dates.push({
                    str: d.toLocaleDateString('en-CA'),
                    dayName: d.toLocaleDateString('en-US', { weekday: 'short' }),
                    dayNum: d.getDate(),
                    jsDayOfWeek: d.getDay() // 0 = Sun, 1 = Mon...
                });
            }
            return dates;
        };
        const tenDays = get10Days();

        // UI Toggle for the New Habit Form
        window.toggleScheduleInputs = () => {
            const type = document.getElementById("scheduleType").value;
            document.getElementById("specificDateWrapper").classList.toggle("hidden", type !== "specific_date");
            document.getElementById("daysOfWeekWrapper").classList.toggle("hidden", type !== "days_of_week");
        };

        // Add Habit with Scheduling
        window.addHabit = async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById("habitInput");
            const typeInput = document.getElementById("scheduleType");
            const name = nameInput.value.trim();
            if (!name) return;

            let scheduleData = null;
            if (typeInput.value === 'specific_date') {
                scheduleData = document.getElementById("specificDateInput").value;
                if (!scheduleData) return alert("Please select a date.");
            } else if (typeInput.value === 'days_of_week') {
                const checked = Array.from(document.querySelectorAll('.day-checkbox:checked')).map(cb => cb.value);
                if (checked.length === 0) return alert("Please select at least one day.");
                scheduleData = checked;
            }
            
            await addDoc(habitsRef, {
                name: name,
                scheduleType: typeInput.value,
                scheduleData: scheduleData,
                history: [],
                createdAt: new Date().toISOString()
            });
            
            nameInput.value = "";
            document.querySelectorAll('.day-checkbox').forEach(cb => cb.checked = false);
        };

        // Select a day in the calendar
        window.selectDate = (dateStr) => {
            window.selectedDate = dateStr;
            renderApp();
        };

        // Toggle a habit for the currently selected date
        window.toggleHabit = async (id, currentHistory) => {
            const historyArray = currentHistory ? currentHistory.split(',') : [];
            const index = historyArray.indexOf(window.selectedDate);
            
            if (index > -1) {
                historyArray.splice(index, 1); // Uncheck
            } else {
                historyArray.push(window.selectedDate); // Check
            }

            await updateDoc(doc(db, "habits", id), { history: historyArray.filter(Boolean) });
        };

        window.deleteHabit = async (id) => {
            if (confirm("Delete this habit?")) await deleteDoc(doc(db, "habits", id));
        };

        window.editHabit = async (id, oldName) => {
            const newName = prompt("Edit habit name (delete to change schedule):", oldName);
            if (newName && newName.trim() !== "") {
                await updateDoc(doc(db, "habits", id), { name: newName.trim() });
            }
        };

        // Evaluate day color (Green, Yellow, Red, Gray)
        const getDayColor = (dateObj) => {
            const habitsDue = allHabits.filter(h => {
                if (h.scheduleType === 'daily' || !h.scheduleType) return true;
                if (h.scheduleType === 'specific_date') return h.scheduleData === dateObj.str;
                if (h.scheduleType === 'days_of_week') return h.scheduleData.includes(dateObj.jsDayOfWeek.toString());
                return false;
            });

            if (habitsDue.length === 0) return 'bg-gray-100 text-gray-400 border-gray-200'; // No habits due

            const completedCount = habitsDue.filter(h => (h.history || []).includes(dateObj.str)).length;
            
            if (completedCount === 0) return 'bg-red-100 text-red-700 border-red-200';
            if (completedCount === habitsDue.length) return 'bg-green-100 text-green-700 border-green-200';
            return 'bg-yellow-100 text-yellow-700 border-yellow-200';
        };

        // Render the entire UI
        const renderApp = () => {
            // 1. Render Calendar
            const calContainer = document.getElementById("calendar");
            calContainer.innerHTML = tenDays.map(date => {
                const colorClasses = getDayColor(date);
                const isSelected = date.str === window.selectedDate;
                const ringClass = isSelected ? 'ring-2 ring-blue-500 ring-offset-2' : '';
                
                return `
                    <button onclick="selectDate('${date.str}')" 
                        class="min-w-[60px] p-2 rounded-xl border flex flex-col items-center transition-all ${colorClasses} ${ringClass}">
                        <span class="text-xs font-semibold uppercase">${date.dayName}</span>
                        <span class="text-xl font-bold">${date.dayNum}</span>
                    </button>
                `;
            }).join('');

            // 2. Render Habits for Selected Date
            const list = document.getElementById("habitsList");
            const formattedSelectedDate = new Date(window.selectedDate).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            document.getElementById("selectedDateLabel").innerText = `Habits for ${formattedSelectedDate}`;
            
            list.innerHTML = "";
            let renderedCount = 0;

            const selectedDateObj = tenDays.find(d => d.str === window.selectedDate) || { str: window.selectedDate, jsDayOfWeek: new Date(window.selectedDate).getDay() };

            allHabits.forEach((habit) => {
                // Check if habit is due on selected date
                let isDue = false;
                if (habit.scheduleType === 'daily' || !habit.scheduleType) isDue = true;
                if (habit.scheduleType === 'specific_date' && habit.scheduleData === window.selectedDate) isDue = true;
                if (habit.scheduleType === 'days_of_week' && habit.scheduleData.includes(selectedDateObj.jsDayOfWeek.toString())) isDue = true;

                if (!isDue) return; // Skip rendering if not due today
                renderedCount++;

                const history = habit.history || [];
                const isCompleted = history.includes(window.selectedDate);
                const historyString = history.join(',');

                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center gap-4 hover:shadow-md transition-shadow">
                        <div class="flex items-center gap-4 flex-1">
                            <button onclick="toggleHabit('${habit.id}', '${historyString}')" 
                                class="w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 text-transparent hover:border-green-400'}">
                                <i class="fas fa-check"></i>
                            </button>
                            <span class="text-lg font-medium ${isCompleted ? 'line-through text-gray-400' : 'text-gray-800'}">${habit.name}</span>
                        </div>
                        <div class="flex gap-3 text-gray-400">
                            <button onclick="editHabit('${habit.id}', '${habit.name}')" class="hover:text-blue-500 transition-colors"><i class="fas fa-pen"></i></button>
                            <button onclick="deleteHabit('${habit.id}')" class="hover:text-red-500 transition-colors"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            if (renderedCount === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 py-6">No habits scheduled for this day. Enjoy the break!</div>`;
            }
        };

        // Listen to Firebase and update local state
        onSnapshot(habitsRef, (snapshot) => {
            allHabits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderApp();
        });
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans selection:bg-blue-100">
    <div class="max-w-2xl mx-auto pt-8 px-4 pb-24">
        
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 tracking-tight text-center md:text-left">3adat</h1>
        </header>

        <!-- 10-Day Calendar -->
        <div class="mb-8 overflow-x-auto pb-4">
            <div id="calendar" class="flex gap-2 min-w-max">
                <!-- Calendar loads here -->
            </div>
        </div>

        <!-- Add Habit Form -->
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm mb-10">
            <h3 class="font-bold text-gray-700 mb-3 text-sm uppercase tracking-wide">Create New Habit</h3>
            <form onsubmit="addHabit(event)" class="flex flex-col gap-3">
                <input type="text" id="habitInput" placeholder="Habit name (e.g., Read 10 pages)" class="px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                
                <div class="flex gap-2">
                    <select id="scheduleType" onchange="toggleScheduleInputs()" class="px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white flex-1">
                        <option value="daily">Every Day</option>
                        <option value="days_of_week">Specific Days (e.g., 3x a week)</option>
                        <option value="specific_date">One Specific Date</option>
                    </select>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm transition-colors">Add</button>
                </div>

                <!-- Conditional Input: Specific Date -->
                <div id="specificDateWrapper" class="hidden mt-2">
                    <input type="date" id="specificDateInput" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Conditional Input: Days of the Week -->
                <div id="daysOfWeekWrapper" class="hidden mt-2 flex flex-wrap gap-2">
                    <label class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-md text-sm"><input type="checkbox" value="0" class="day-checkbox"> Sun</label>
                    <label class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-md text-sm"><input type="checkbox" value="1" class="day-checkbox"> Mon</label>
                    <label class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-md text-sm"><input type="checkbox" value="2" class="day-checkbox"> Tue</label>
                    <label class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-md text-sm"><input type="checkbox" value="3" class="day-checkbox"> Wed</label>
                    <label class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-md text-sm"><input type="checkbox" value="4" class="day-checkbox"> Thu</label>
                    <label class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-md text-sm"><input type="checkbox" value="5" class="day-checkbox"> Fri</label>
                    <label class="flex items-center gap-1 bg-gray-100 px-3 py-1 rounded-md text-sm"><input type="checkbox" value="6" class="day-checkbox"> Sat</label>
                </div>
            </form>
        </div>

        <!-- Habits List -->
        <div>
            <h2 id="selectedDateLabel" class="text-xl font-bold text-gray-800 mb-4">Habits</h2>
            <div id="habitsList" class="flex flex-col gap-3">
                <!-- Cards render here automatically based on selected date -->
            </div>
        </div>

    </div>
</body>
</html>
